<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="crbvYC1Cw7BUhYRCc7BYcpw_Q4F6ecmTPgNO6VjLcxc" />
    
    <title>OP BOT | التحقق من المستخدم</title>
    <style>
        :root { --main: #4ade80; --bg: #062b2b; }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
            position: relative;
        }

        /* خلفية ضوئية خلف الكارت */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--main);
            filter: blur(150px);
            opacity: 0.1;
            z-index: 0;
        }

        .verify-card { 
            background: #0a3a3a; 
            padding: 40px; 
            border-radius: 25px; 
            text-align: center; 
            border: 2px solid var(--main); 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); 
            width: 90%; 
            max-width: 400px; 
            z-index: 1;
            backdrop-filter: blur(5px);
        }

        .logo { 
            width: 130px; 
            height: 130px; 
            border-radius: 50%; 
            border: 4px solid var(--main); 
            margin-bottom: 25px; 
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
            transition: 0.5s;
        }

        .logo:hover { transform: rotate(360deg); }

        h2 { font-size: 1.8rem; margin-bottom: 10px; color: white; }

        .checkbox-area { 
            background: rgba(0,0,0,0.3); 
            padding: 20px; 
            border-radius: 15px; 
            margin: 25px 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            border: 1px solid rgba(74, 222, 128, 0.1);
            transition: 0.3s;
        }

        .checkbox-area:hover { border-color: var(--main); }

        input[type="checkbox"] { 
            width: 24px; 
            height: 24px; 
            cursor: pointer; 
            accent-color: var(--main); 
        }

        .btn { 
            background: var(--main); 
            color: #062b2b; 
            padding: 16px 45px; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 800; 
            cursor: pointer; 
            display: inline-block; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: none; 
            font-size: 1.1rem;
            width: 100%;
        }

        .btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(74, 222, 128, 0.4); 
            filter: brightness(1.1);
        }

        p { color: #cbd5e1; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="verify-card">
        <img src="logo.jpg" class="logo" alt="OP BOT">
        <h2>نظام حماية OP BOT</h2>
        <p>يرجى تأكيد هويتك للوصول إلى الموقع الرسمي</p>
        
        <div class="checkbox-area">
            <input type="checkbox" id="robotCheck">
            <label for="robotCheck" style="font-size: 1.1rem; cursor: pointer; user-select: none;">أنا لست روبوت</label>
        </div>
        
        <button onclick="startVerification()" class="btn">دخول الموقع</button>
    </div>

    <script>
        function startVerification() {
            const isChecked = document.getElementById('robotCheck').checked;
            if (isChecked) {
                // هينقلك لصفحة home.html زي ما طلبت
                window.location.href = "home.html";
            } else {
                alert("يا بطل، لازم تضغط على المربع الأول!");
            }
        }
    </script>

</body>
</html>
